<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Packet Rush — Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060b13;
    --grid-line: rgba(255,255,255,0.035);
    --panel: #0e1a2c;
    --panel-border: rgba(255,255,255,0.10);
    --glass-bg: rgba(12,20,34,0.55);
    --glass-border: rgba(255,255,255,0.16);
    --cyan: #00e6ff;
    --magenta: #ff2ec4;
    --green: #34ffb0;
    --red: #ff4d5e;
    --gold: #ffcf4d;
    --text: #eaf6ff;
    --muted: #7fa3c4;
    --mono: 'JetBrains Mono', ui-monospace, Consolas, monospace;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }
  body {
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 42px 42px;
  }

  /* ---------- Loading splash ---------- */
  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
    transition: opacity 0.4s ease;
  }
  #loading .logo {
    font-family: var(--mono);
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 6px;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: pulse 1.1s ease-in-out infinite;
  }
  #loading .bar {
    width: 200px; height: 3px; margin-top: 22px;
    background: var(--panel-border);
    border-radius: 3px; overflow: hidden;
  }
  #loading .bar span {
    display: block; height: 100%; width: 40%;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    animation: sweep 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
  @keyframes sweep { 0%{transform:translateX(-120%)} 100%{transform:translateX(360%)} }
  #loading.hidden { opacity: 0; pointer-events: none; }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 22px 32px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #app.ready { opacity: 1; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .wordmark { display: flex; align-items: baseline; gap: 10px; }
  h1 {
    margin: 0;
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 6px;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .wordmark .tag {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    border: 1px solid var(--panel-border);
    padding: 3px 8px;
    border-radius: 5px;
  }
  .headerRight { display: flex; align-items: center; gap: 12px; }
  #bestTime {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--panel-border);
    padding: 8px 16px;
    border-radius: 8px;
  }
  #bestTime .val { color: var(--magenta); font-weight: 700; margin-left: 6px; }

  .iconBtn {
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    cursor: pointer;
    color: var(--text);
  }
  .iconBtn:hover { border-color: var(--cyan); }
  .iconBtn svg { width: 18px; height: 18px; }

  #stage {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  canvas {
    width: 100%;
    max-width: 1200px;
    height: auto;
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    background: #081222;
  }
  #overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .glass {
    pointer-events: auto;
    text-align: center;
    background: var(--glass-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--glass-border);
    border-top-color: rgba(255,255,255,0.28);
    border-radius: 18px;
    padding: 34px 50px;
    animation: popIn 0.35s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes popIn { from { opacity:0; transform: scale(0.92) } to { opacity:1; transform: scale(1) } }

  #waiting .label { font-family: var(--mono); font-size: 15px; letter-spacing: 4px; color: var(--cyan); margin-bottom: 16px; }
  #waiting img { width: 190px; height: 190px; border-radius: 10px; background: #fff; padding: 10px; display: block; margin: 0 auto 18px; }
  #howToPlay { display: flex; gap: 22px; justify-content: center; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  #howToPlay div { max-width: 140px; }
  #howToPlay b { display: block; color: var(--text); font-size: 13px; margin-bottom: 4px; }

  #hud { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); text-align: center; }
  #playerName { font-family: var(--mono); font-size: 13px; letter-spacing: 3px; color: var(--muted); margin-bottom: 4px; }
  #timer { font-family: var(--mono); font-size: 50px; font-weight: 700; font-variant-numeric: tabular-nums; }
  #delta { font-family: var(--mono); font-size: 18px; font-weight: 700; letter-spacing: 1px; }

  #countdown {
    font-family: var(--mono);
    font-size: 140px;
    font-weight: 700;
    color: var(--cyan);
    text-shadow: 0 0 40px rgba(0,230,255,0.6);
  }
  #countdown.go { color: var(--green); text-shadow: 0 0 40px rgba(52,255,176,0.7); font-size: 90px; letter-spacing: 6px; }
  .countKey { animation: countPop 0.5s cubic-bezier(.2,.9,.3,1.3); }
  @keyframes countPop { from { opacity:0; transform: scale(0.5) } to { opacity:1; transform: scale(1) } }

  #resultTitle { font-family: var(--mono); font-size: 30px; letter-spacing: 3px; color: var(--magenta); margin-bottom: 6px; }
  #resultTime { font-family: var(--mono); font-size: 24px; margin-bottom: 14px; }
  #badgeRow { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .badge {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--gold);
    color: var(--gold);
    background: rgba(255,207,77,0.08);
    opacity: 0;
    animation: badgeIn 0.4s ease forwards;
  }
  @keyframes badgeIn { from { opacity:0; transform: translateY(6px) } to { opacity:1; transform: translateY(0) } }

  #leaderboard {
    margin-top: 14px;
    background: var(--panel);
    border-radius: var(--radius);
    padding: 14px 24px;
    border: 1px solid var(--panel-border);
  }
  #leaderboard h2 { margin: 0 0 10px 0; font-family: var(--mono); font-size: 13px; letter-spacing: 3px; color: var(--muted); font-weight: 500; }
  #lbList { display: flex; gap: 26px; list-style: none; margin: 0; padding: 0; flex-wrap: wrap; font-family: var(--mono); font-size: 14px; }
  #lbList li { color: #cfeeff; }
  #lbList li:first-child { color: var(--magenta); font-weight: 700; }

  #confettiLayer { position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }
  .confetti { position: absolute; top: -10px; width: 8px; height: 14px; opacity: 0.9; animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(110vh) rotate(540deg); opacity: 0.2; } }

  .hidden { display: none !important; }

  @media (max-width: 800px) {
    h1 { font-size: 22px; letter-spacing: 3px; }
    #timer { font-size: 34px; }
    #countdown { font-size: 90px; }
    #lbList { font-size: 12px; gap: 14px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="logo">PACKET RUSH</div>
  <div class="bar"><span></span></div>
</div>

<div id="app">
  <header>
    <div class="wordmark">
      <h1>PACKET RUSH</h1>
      <span class="tag">LIVE</span>
    </div>
    <div class="headerRight">
      <div id="bestTime">RECORD<span class="val">--:--</span></div>
      <button id="muteBtn" class="iconBtn" title="Mute / unmute (M)"></button>
      <button id="fullscreenBtn" class="iconBtn" title="Fullscreen (F)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      </button>
    </div>
  </header>

  <div id="stage">
    <canvas id="track" width="1200" height="440"></canvas>
    <div id="overlay">
      <div id="waiting" class="glass">
        <div class="label">SCAN TO JOIN THE NETWORK</div>
        <img src="/qr" alt="Scan to join" />
        <div id="howToPlay">
          <div><b>TILT</b>Steer left/right through the network</div>
          <div><b>BOOST LANE</b>Faster, but hazards may knock you back</div>
          <div><b>GHOST</b>Race the current all-time record live</div>
        </div>
      </div>
      <div id="hud" class="hidden">
        <div id="playerName"></div>
        <div id="timer">T+00.00s</div>
        <div id="delta"></div>
      </div>
      <div id="countdown" class="hidden"></div>
      <div id="result" class="glass hidden">
        <div id="resultTitle"></div>
        <div id="resultTime"></div>
        <div id="badgeRow"></div>
      </div>
    </div>
  </div>

  <div id="leaderboard">
    <h2>TOP TIMES TODAY</h2>
    <ol id="lbList"></ol>
  </div>
</div>

<div id="confettiLayer"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ============================================================
  // Synthesized audio engine — no external sound files needed,
  // so the booth never depends on venue internet for SFX/music.
  // ============================================================
  const AudioEngine = (() => {
    let ctx, musicNodes = null;
    let muted = localStorage.getItem("pr_muted") === "1";

    function ensureCtx() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === "suspended") ctx.resume();
      return ctx;
    }
    function beep({ freq = 440, duration = 0.12, type = "sine", gain = 0.15, sweep = null } = {}) {
      if (muted) return;
      const c = ensureCtx();
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime);
      if (sweep) osc.frequency.exponentialRampToValueAtTime(sweep, c.currentTime + duration);
      g.gain.setValueAtTime(gain, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
      osc.connect(g).connect(c.destination);
      osc.start();
      osc.stop(c.currentTime + duration);
    }
    function tick() { beep({ freq: 440, duration: 0.09, type: "sine", gain: 0.12 }); }
    function go() { beep({ freq: 880, duration: 0.28, type: "sawtooth", gain: 0.15, sweep: 1400 }); }
    function hazard() { beep({ freq: 180, duration: 0.18, type: "square", gain: 0.16, sweep: 60 }); }
    function finishJingle() {
      [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => beep({ freq: f, duration: 0.18, type: "triangle", gain: 0.14 }), i * 90));
    }
    function recordJingle() {
      [659, 784, 988, 1318, 988, 1318].forEach((f, i) => setTimeout(() => beep({ freq: f, duration: 0.2, type: "triangle", gain: 0.16 }), i * 90));
    }
    function startAmbient() {
      if (muted || musicNodes) return;
      const c = ensureCtx();
      const osc1 = c.createOscillator(); osc1.type = "sine"; osc1.frequency.value = 55;
      const osc2 = c.createOscillator(); osc2.type = "sine"; osc2.frequency.value = 82.5;
      const filter = c.createBiquadFilter(); filter.type = "lowpass"; filter.frequency.value = 260;
      const g = c.createGain(); g.gain.value = 0.03;
      osc1.connect(filter); osc2.connect(filter); filter.connect(g).connect(c.destination);
      osc1.start(); osc2.start();
      musicNodes = { osc1, osc2, g };
    }
    function stopAmbient() {
      if (musicNodes) { musicNodes.osc1.stop(); musicNodes.osc2.stop(); musicNodes = null; }
    }
    function setMuted(v) {
      muted = v;
      localStorage.setItem("pr_muted", v ? "1" : "0");
      if (muted) stopAmbient(); else startAmbient();
    }
    function isMuted() { return muted; }
    return { tick, go, hazard, finishJingle, recordJingle, startAmbient, stopAmbient, setMuted, isMuted, ensureCtx };
  })();

  const socket = io();
  const canvas = document.getElementById("track");
  const ctx = canvas.getContext("2d");
  const $ = (id) => document.getElementById(id);
  const fmt = (ms) => (ms / 1000).toFixed(2) + "s";
  const fmtTimer = (ms) => "T+" + (ms / 1000).toFixed(2) + "s";
  const lerp = (a, b, f) => a + (b - a) * f;

  let trackLength = 6000;
  let hazards = [];
  let stateBuffer = []; // recent race:tick payloads, for smooth interpolated rendering

  // ---------------- Mute button ----------------
  const muteIcons = {
    on: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M19 5a10 10 0 0 1 0 14M15.5 8.5a5 5 0 0 1 0 7"/></svg>',
    off: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M23 9l-6 6M17 9l6 6"/></svg>'
  };
  function refreshMuteBtn() {
    $("muteBtn").innerHTML = AudioEngine.isMuted() ? muteIcons.off : muteIcons.on;
  }
  $("muteBtn").onclick = () => {
    AudioEngine.setMuted(!AudioEngine.isMuted());
    refreshMuteBtn();
  };
  refreshMuteBtn();

  $("fullscreenBtn").onclick = () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
  };
  window.addEventListener("keydown", (e) => {
    if (e.key.toLowerCase() === "m") { AudioEngine.setMuted(!AudioEngine.isMuted()); refreshMuteBtn(); }
    if (e.key.toLowerCase() === "f") $("fullscreenBtn").click();
  });

  // ---------------- Canvas rendering ----------------
  function toScreen(distance, x) {
    const px = (distance / trackLength) * canvas.width;
    const py = canvas.height / 2 - (x / 150) * (canvas.height / 2 - 40);
    return [px, py];
  }

  // Router "checkpoint" nodes decorate the track and pulse gently — purely
  // atmospheric, reinforces the network theme even when no one is racing.
  const ROUTER_COUNT = 7;
  const routerNodes = Array.from({ length: ROUTER_COUNT }, (_, i) => ({
    distance: ((i + 1) / (ROUTER_COUNT + 1)) * trackLength,
    phase: Math.random() * Math.PI * 2,
  }));

  // Idle ambient "data flow" particles — small dots drifting along the lanes
  // even when the track is empty, so the booth screen never looks static.
  const ambientParticles = Array.from({ length: 22 }, () => ({
    p: Math.random(),
    lane: Math.random() < 0.5 ? (Math.random() < 0.5 ? 90 : -90) : (Math.random() - 0.5) * 80,
    speed: 0.08 + Math.random() * 0.12,
    size: 1 + Math.random() * 2,
  }));

  // Comet trails for the player and ghost packets
  let playerTrail = [];
  let ghostTrail = [];
  const TRAIL_LENGTH = 16;

  // Hazard-hit feedback state
  let hazardFlashUntil = 0;
  let shakeUntil = 0;

  function triggerHazardFx() {
    hazardFlashUntil = performance.now() + 320;
    shakeUntil = performance.now() + 260;
  }

  function pushTrail(trail, pt) {
    if (!pt) return;
    trail.push(pt);
    if (trail.length > TRAIL_LENGTH) trail.shift();
  }

  function drawTrail(trail, color) {
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const [x, y] = toScreen(t.distance, t.x);
      const alpha = (i / trail.length) * 0.35;
      const r = 3 + (i / trail.length) * 5;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color.replace("ALPHA", alpha.toFixed(3));
      ctx.fill();
    }
  }

  // Draws the packet as a rotating hex "node" with a pulsing core, rather
  // than a flat circle — reads as a piece of live data, not just a dot.
  function drawPacket(px, py, baseColor, glowColor, boosting, now) {
    const rot = now / 260;
    const pulse = 1 + Math.sin(now / 140) * 0.12;
    const size = 11 * pulse;

    ctx.save();
    ctx.translate(px, py);

    // outer glow
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = boosting ? 30 : 20;

    // rotating hex ring
    ctx.rotate(rot);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i;
      const x = Math.cos(a) * size;
      const y = Math.sin(a) * size;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = baseColor;
    ctx.fill();
    ctx.restore();

    // inner core (not rotated, so it reads as a steady pulse)
    ctx.save();
    ctx.translate(px, py);
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.38, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.fill();
    ctx.restore();
  }

  // Short streak lines behind a boosting packet for a sense of speed
  function drawSpeedLines(px, py, color, now) {
    for (let i = 0; i < 4; i++) {
      const offset = (now / 5 + i * 30) % 40;
      ctx.strokeStyle = color.replace("ALPHA", (0.25 - i * 0.05).toFixed(2));
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px - 14 - offset, py + (i - 1.5) * 4);
      ctx.lineTo(px - 26 - offset, py + (i - 1.5) * 4);
      ctx.stroke();
    }
  }

  function drawTrack(player, ghost, now) {
    now = now || performance.now();

    // Screen shake on hazard hit
    let shakeX = 0, shakeY = 0;
    const shakeRemaining = shakeUntil - now;
    if (shakeRemaining > 0) {
      const strength = (shakeRemaining / 260) * 6;
      shakeX = (Math.random() - 0.5) * strength;
      shakeY = (Math.random() - 0.5) * strength;
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);

    ctx.clearRect(-10, -10, canvas.width + 20, canvas.height + 20);
    ctx.fillStyle = "#081222";
    ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);

    const [, safeTop] = toScreen(0, 50);
    const [, safeBottom] = toScreen(0, -50);
    ctx.fillStyle = "rgba(0,230,255,0.07)";
    ctx.fillRect(0, safeTop, canvas.width, safeBottom - safeTop);
    ctx.strokeStyle = "rgba(0,230,255,0.25)";
    ctx.setLineDash([8, 10]);
    ctx.beginPath();
    ctx.moveTo(0, safeTop); ctx.lineTo(canvas.width, safeTop);
    ctx.moveTo(0, safeBottom); ctx.lineTo(canvas.width, safeBottom);
    ctx.stroke();
    ctx.setLineDash([]);

    // hazards, with a soft pulsing edge so they read as "live" dangers
    const hazardPulse = 0.22 + Math.sin(now / 260) * 0.08;
    hazards.forEach((hz) => {
      const [x1] = toScreen(hz.distanceStart, 0);
      const [x2] = toScreen(hz.distanceEnd, 0);
      const [, yTop] = toScreen(0, hz.xEnd);
      const [, yBottom] = toScreen(0, hz.xStart);
      ctx.fillStyle = `rgba(255,77,94,${hazardPulse.toFixed(3)})`;
      ctx.fillRect(x1, yTop, Math.max(2, x2 - x1), yBottom - yTop);
      ctx.strokeStyle = "rgba(255,77,94,0.5)";
      ctx.strokeRect(x1, yTop, Math.max(2, x2 - x1), yBottom - yTop);
    });

    // router / checkpoint nodes, gently pulsing
    routerNodes.forEach((r) => {
      [50, -50].forEach((laneX) => {
        const [rx, ry] = toScreen(r.distance, laneX);
        const s = 4 + Math.sin(now / 500 + r.phase) * 1.5;
        ctx.beginPath();
        ctx.arc(rx, ry, s, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(127,163,196,0.35)";
        ctx.fill();
      });
    });

    // ambient idle data-flow particles (always animate, race or not)
    ambientParticles.forEach((p) => {
      p.p += p.speed / 1000 * 16.7; // ~ per frame at 60fps
      if (p.p > 1.05) p.p = -0.05;
      const dist = p.p * trackLength;
      if (dist < 0 || dist > trackLength) return;
      const [ax, ay] = toScreen(dist, p.lane);
      ctx.beginPath();
      ctx.arc(ax, ay, p.size, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,230,255,0.18)";
      ctx.fill();
    });

    // finish line, softly pulsing
    const finishGlow = 0.7 + Math.sin(now / 300) * 0.2;
    ctx.fillStyle = `rgba(234,246,255,${finishGlow.toFixed(2)})`;
    ctx.fillRect(canvas.width - 4, 0, 4, canvas.height);
    ctx.fillStyle = "#7fa3c4";
    ctx.font = "12px 'JetBrains Mono', monospace";
    ctx.fillText("SERVER", canvas.width - 62, 18);

    // hazard flash overlay
    const flashRemaining = hazardFlashUntil - now;
    if (flashRemaining > 0) {
      ctx.fillStyle = `rgba(255,77,94,${(flashRemaining / 320 * 0.18).toFixed(3)})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // ghost: trail + packet
    if (ghost) {
      pushTrail(ghostTrail, ghost);
      drawTrail(ghostTrail, "rgba(255,46,196,ALPHA)");
      const [gx, gy] = toScreen(ghost.distance, ghost.x);
      drawPacket(gx, gy, "#ff2ec4", "#ff2ec4", Math.abs(ghost.x) > 50, now);
    }

    // player: speed lines + trail + packet
    if (player) {
      pushTrail(playerTrail, player);
      const boosting = Math.abs(player.x) > 50;
      const [px, py] = toScreen(player.distance, player.x);
      if (boosting) drawSpeedLines(px, py, "rgba(0,230,255,ALPHA)", now);
      drawTrail(playerTrail, "rgba(0,230,255,ALPHA)");
      drawPacket(px, py, "#00e6ff", "#00e6ff", boosting, now);
    }

    ctx.restore();
  }

  // Renders at full display refresh rate by interpolating between the last
  // two authoritative 20Hz server ticks — smooth motion without needing the
  // server to send updates any faster.
  function renderLoop() {
    requestAnimationFrame(renderLoop);
    const now = performance.now();
    if (stateBuffer.length >= 2) {
      const RENDER_DELAY = 60;
      const renderTime = now - RENDER_DELAY;
      let a = null, b = null;
      for (let i = 0; i < stateBuffer.length - 1; i++) {
        if (stateBuffer[i]._t <= renderTime && stateBuffer[i + 1]._t >= renderTime) {
          a = stateBuffer[i]; b = stateBuffer[i + 1]; break;
        }
      }
      if (!a) { a = b = stateBuffer[stateBuffer.length - 1]; }
      let f = a === b ? 1 : (renderTime - a._t) / ((b._t - a._t) || 1);
      f = Math.max(0, Math.min(1, f));
      const player = a.player && b.player
        ? { distance: lerp(a.player.distance, b.player.distance, f), x: lerp(a.player.x, b.player.x, f) }
        : (b.player || a.player);
      const ghost = a.ghost && b.ghost
        ? { distance: lerp(a.ghost.distance, b.ghost.distance, f), x: lerp(a.ghost.x, b.ghost.x, f) }
        : (b.ghost || a.ghost);
      drawTrack(player, ghost, now);
    } else {
      // idle attract-mode rendering — keeps the ambient particles/nodes alive
      drawTrack(null, null, now);
    }
  }
  requestAnimationFrame(renderLoop);

  function renderLeaderboard(lb) {
    const list = $("lbList");
    list.innerHTML = "";
    lb.forEach((entry, i) => {
      const li = document.createElement("li");
      li.textContent = `#${i + 1} ${entry.name} — ${fmt(entry.time)}`;
      list.appendChild(li);
    });
  }

  function spawnConfetti() {
    const layer = $("confettiLayer");
    const colors = ["#00e6ff", "#ff2ec4", "#34ffb0", "#ffcf4d"];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement("div");
      el.className = "confetti";
      el.style.left = Math.random() * 100 + "vw";
      el.style.background = colors[i % colors.length];
      el.style.animationDuration = 2 + Math.random() * 1.5 + "s";
      el.style.animationDelay = Math.random() * 0.4 + "s";
      layer.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
  }

  // ---------------- Socket events ----------------
  socket.on("state:init", (s) => {
    trackLength = s.trackLength;
    hazards = s.hazards;
    $("bestTime").innerHTML = "RECORD<span class='val'>" + (s.bestTime ? fmt(s.bestTime) : "--:--") + "</span>";
    renderLeaderboard(s.leaderboard);
    drawTrack(null, null);
    $("loading").classList.add("hidden");
    $("app").classList.add("ready");
    AudioEngine.startAmbient();
  });

  socket.on("display:playerJoined", ({ name }) => {
    $("waiting").classList.add("hidden");
    $("hud").classList.remove("hidden");
    $("result").classList.add("hidden");
    $("playerName").textContent = name.toUpperCase() + " · GET READY";
    $("timer").textContent = "T+00.00s";
    $("delta").textContent = "";
  });

  socket.on("display:playerLeft", () => {
    $("waiting").classList.remove("hidden");
    $("hud").classList.add("hidden");
    $("countdown").classList.add("hidden");
    stateBuffer = [];
    drawTrack(null, null);
  });

  socket.on("race:countdown", ({ seconds, name }) => {
    $("hud").classList.add("hidden");
    const cd = $("countdown");
    cd.classList.remove("hidden");
    if (seconds > 0) {
      cd.textContent = seconds;
      cd.className = "countKey";
      AudioEngine.tick();
    } else {
      cd.textContent = "GO!";
      cd.className = "countKey go";
      AudioEngine.go();
    }
  });

  socket.on("race:start", (s) => {
    trackLength = s.trackLength;
    hazards = s.hazards;
    stateBuffer = [];
    $("result").classList.add("hidden");
    $("countdown").classList.add("hidden");
    $("hud").classList.remove("hidden");
    $("playerName").textContent = s.name.toUpperCase() + " · RACING";
  });

  socket.on("race:tick", (s) => {
    stateBuffer.push({ ...s, _t: performance.now() });
    if (stateBuffer.length > 6) stateBuffer.shift();
    $("timer").textContent = fmtTimer(s.elapsed);
    if (s.ghost) {
      const delta = Math.round(s.player.distance - s.ghost.distance);
      const d = $("delta");
      d.textContent = "Δ " + (delta >= 0 ? "+" : "") + delta + "u";
      d.style.color = delta >= 0 ? "var(--green)" : "var(--red)";
    }
  });

  socket.on("race:hazardHit", () => AudioEngine.hazard());

  socket.on("race:finished", (s) => {
    $("bestTime").innerHTML = "RECORD<span class='val'>" + fmt(s.bestTime) + "</span>";
    $("resultTitle").textContent = s.isNewRecord ? "★ NEW RECORD ★" : "LAP COMPLETE";
    $("resultTime").textContent = s.name + " — " + fmt(s.finalTime);
    const row = $("badgeRow");
    row.innerHTML = "";
    (s.achievements || []).forEach((a, i) => {
      const chip = document.createElement("div");
      chip.className = "badge";
      chip.style.animationDelay = i * 0.12 + "s";
      chip.textContent = a.label;
      chip.title = a.desc;
      row.appendChild(chip);
    });
    $("result").classList.remove("hidden");
    renderLeaderboard(s.leaderboard);
    if (s.isNewRecord) { AudioEngine.recordJingle(); spawnConfetti(); }
    else { AudioEngine.finishJingle(); }
  });
</script>
</body>
</html>
